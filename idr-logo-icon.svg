<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <linearGradient id="topFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B1A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8520A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leftFace" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1A1A1A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2D2D2D;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rightFace" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3D3D3D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#555555;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Isometric cube -->
  <!-- Top face -->
  <polygon points="40,8 68,24 40,40 12,24" fill="url(#topFace)"/>
  <!-- Left face -->
  <polygon points="12,24 40,40 40,68 12,52" fill="url(#leftFace)"/>
  <!-- Right face -->
  <polygon points="68,24 40,40 40,68 68,52" fill="url(#rightFace)"/>
  <!-- Inner shield / overlay on top face for risk symbol -->
  <polygon points="40,14 62,26 40,38 18,26" fill="#FF8C42" opacity="0.3"/>
  <!-- Center dot -->
  <circle cx="40" cy="40" r="3" fill="white" opacity="0.9"/>
</svg>
